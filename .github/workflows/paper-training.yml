# ══════════════════════════════════════════════════════════════════════════════
#  Paper Trading – ML Model Training
#  Trains all ML models (LSTM, XGBoost, Gradient Boosting, Random Forest) on
#  historical Hyperliquid data using the paper broker for walk-forward validation.
#  Runs daily and on demand.
# ══════════════════════════════════════════════════════════════════════════════

name: Paper Trading – Model Training

on:
  # Daily retraining at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols to train (e.g. BTC,ETH,SOL,ARB)"
        required: false
        default: "BTC,ETH,SOL,ARB"
      lookback_candles:
        description: "Number of candles to use for training"
        required: false
        default: "2000"
      force_retrain:
        description: "Force retraining even if models are fresh"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: paper-training
  cancel-in-progress: false

jobs:
  train:
    name: Train ML Models
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore existing models (skip training if fresh)
        id: model-cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ml-models-${{ github.sha }}
          restore-keys: |
            ml-models-

      - name: Create directories
        run: mkdir -p models results .trading_state

      - name: Set training environment
        run: |
          echo "TRAINING_SYMBOLS=${{ inputs.symbols || 'BTC,ETH,SOL,ARB' }}" >> "$GITHUB_ENV"
          echo "LOOKBACK_CANDLES=${{ inputs.lookback_candles || '2000' }}" >> "$GITHUB_ENV"

      - name: Run model training
        env:
          TRADING_MODE: paper
          LOG_LEVEL: INFO
        run: |
          echo "## 🤖 Model Training Started" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Symbols:** $TRAINING_SYMBOLS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Lookback:** $LOOKBACK_CANDLES candles" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python -m src.main --run-type train-models --mode paper

      - name: Run paper broker walk-forward validation
        env:
          TRADING_MODE: paper
          LOG_LEVEL: INFO
        run: |
          echo "## 📊 Walk-Forward Validation" >> "$GITHUB_STEP_SUMMARY"
          python -m src.main --run-type evaluate --mode paper

      - name: Save trained models
        uses: actions/cache/save@v4
        with:
          path: models/
          key: ml-models-${{ github.sha }}

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-models-${{ github.run_number }}
          path: |
            models/
            results/training_scores.json
          retention-days: 90

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-report-${{ github.run_number }}
          path: results/evaluation_report.json
          retention-days: 30

  # ── Trigger live signal after successful training ──────────────────────────
  trigger-signal-cycle:
    name: Trigger Signal Cycle
    runs-on: ubuntu-latest
    needs: train
    if: success()
    steps:
      - name: Trigger quantum trading signal
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'quantum_trade_signal',
              client_payload: {
                mode: 'paper',
                run_type: 'signal',
                triggered_by: 'paper-training'
              }
            });
            core.info('Dispatched quantum_trade_signal after training');
