# ══════════════════════════════════════════════════════════════════════════════
#  Paper Trading – ML Model Training
#  Trains all ML models (LSTM, XGBoost, Gradient Boosting, Random Forest,
#  ExtraTrees tree-classifier) on historical Hyperliquid data using the paper
#  broker for walk-forward validation.
#  Runs 4 times per day (every 6 hours) across multiplex timeframes
#  (1m, 5m, 15m, 1h, 1d) and on demand.
# ══════════════════════════════════════════════════════════════════════════════

name: Paper Trading – Model Training

on:
  # 4 training sessions per day at 06:00, 12:00, 18:00, 00:00 UTC
  schedule:
    - cron: "0 6 * * *"    # Session 1 – morning (after daily data download at 02:00)
    - cron: "0 12 * * *"   # Session 2 – midday
    - cron: "0 18 * * *"   # Session 3 – evening
    - cron: "0 0 * * *"    # Session 4 – midnight

  # Triggered by the data-download workflow after fresh CSVs are written
  repository_dispatch:
    types:
      - quantum_retrain

  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols to train (e.g. BTC,ETH,SOL,ARB)"
        required: false
        default: "BTC,ETH,SOL,ARB,ZRO,AAVE,FLOKI,SHIB,XAUT"
      lookback_candles:
        description: "Number of candles to use for training"
        required: false
        default: "2000"
      training_epochs:
        description: "Number of training epochs"
        required: false
        default: "3"
      force_retrain:
        description: "Force retraining even if models are fresh"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: paper-training
  cancel-in-progress: false

jobs:
  train:
    name: Train ML Models
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore existing models (skip training if fresh)
        id: model-cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ml-models-${{ github.ref_name }}
          restore-keys: |
            ml-models-

      - name: Restore OHLCV CSV cache
        uses: actions/cache@v4
        with:
          path: datasets/csv/
          key: ohlcv-csv-${{ github.ref_name }}
          restore-keys: |
            ohlcv-csv-${{ github.ref_name }}-
            ohlcv-csv-

      - name: Create directories
        run: mkdir -p models results .trading_state datasets/csv

      - name: Set training environment
        run: |
          echo "TRAINING_SYMBOLS=${{ inputs.symbols || 'BTC,ETH,SOL,ARB,ZRO,AAVE,FLOKI,SHIB,XAUT' }}" >> "$GITHUB_ENV"
          echo "LOOKBACK_CANDLES=${{ inputs.lookback_candles || '2000' }}" >> "$GITHUB_ENV"
          echo "TRAINING_EPOCHS=${{ inputs.training_epochs || '3' }}" >> "$GITHUB_ENV"
          echo "FORCE_RETRAIN=${{ inputs.force_retrain || 'false' }}" >> "$GITHUB_ENV"

      - name: Run model training (multiplex 1m/5m/15m/1h/1d)
        env:
          TRADING_MODE: paper
          LOG_LEVEL: INFO
        run: |
          HOUR=$(date -u +%H)
          SESSION="unknown"
          case "$HOUR" in
            06) SESSION="1-of-4 (morning)" ;;
            12) SESSION="2-of-4 (midday)" ;;
            18) SESSION="3-of-4 (evening)" ;;
            00|0) SESSION="4-of-4 (midnight)" ;;
            *) SESSION="on-demand" ;;
          esac
          echo "## 🤖 Model Training Session ${SESSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Symbols:** $TRAINING_SYMBOLS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Lookback:** $LOOKBACK_CANDLES candles" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Epochs:** $TRAINING_EPOCHS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Timeframes:** 1m, 5m, 15m, 1h, 1d (multiplex)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Models:** LSTM, XGBoost, GradientBoost, RandomForest, ExtraTrees (tree-classifier), Linear" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python -m src.main --run-type train-models --mode paper

      - name: Run paper broker walk-forward validation
        env:
          TRADING_MODE: paper
          LOG_LEVEL: INFO
        run: |
          echo "## 📊 Walk-Forward Validation" >> "$GITHUB_STEP_SUMMARY"
          python -m src.main --run-type evaluate --mode paper

      - name: Save trained models
        uses: actions/cache/save@v4
        with:
          path: models/
          key: ml-models-${{ github.ref_name }}

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-models-${{ github.run_number }}
          path: |
            models/
            results/training_scores.json
          retention-days: 90

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-report-${{ github.run_number }}
          path: results/evaluation_report.json
          retention-days: 30

  # ── Trigger live signal after successful training ──────────────────────────
  trigger-signal-cycle:
    name: Trigger Signal Cycle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: train
    if: success()
    steps:
      - name: Trigger quantum trading signal
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'quantum_trade_signal',
              client_payload: {
                mode: 'paper',
                run_type: 'signal',
                triggered_by: 'paper-training'
              }
            });
            core.info('Dispatched quantum_trade_signal after training');

