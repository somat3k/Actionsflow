# ══════════════════════════════════════════════════════════════════════════════
#  Quantum Trading Orchestrator
#  Main GitHub Actions workflow that orchestrates the complete trading pipeline:
#  Data fetch (Hyperliquid) → ML inference → Gemini AI validation →
#  Risk management (10–35x leverage) → Paper/Live execution → Evaluation
# ══════════════════════════════════════════════════════════════════════════════

name: Quantum Trading Orchestrator

on:
  # Every minute – high-frequency paper signal cycle
  schedule:
    - cron: "*/1 * * * *"

  # Allow manual trigger with parameter overrides
  workflow_dispatch:
    inputs:
      trading_mode:
        description: "Trading mode"
        required: true
        default: "paper"
        type: choice
        options:
          - paper
          - live
      run_type:
        description: "What to run"
        required: true
        default: "signal"
        type: choice
        options:
          - signal
          - evaluate
          - train-models
      interval_sequence:
        description: "Comma-separated intervals for signal testing sequence"
        required: false
        default: "1m,5m,15m"
      min_trades_per_day:
        description: "Minimum target paper trades per day"
        required: false
        default: "2000"
      symbols:
        description: "Comma-separated symbols to trade (e.g. BTC,ETH)"
        required: false
        default: "BTC,ETH,SOL,ARB"

  # Trigger from other workflows (training completion, evaluation, etc.)
  workflow_call:
    inputs:
      trading_mode:
        type: string
        default: "paper"
      run_type:
        type: string
        default: "signal"
      interval_sequence:
        type: string
        default: "1m,5m,15m"
      min_trades_per_day:
        type: string
        default: "2000"

  # Allow repository_dispatch from external systems (e.g. webhooks)
  repository_dispatch:
    types:
      - quantum_trade_signal
      - quantum_retrain
      - quantum_evaluate

concurrency:
  group: quantum-trading-${{ github.event_name }}-${{ inputs.trading_mode || 'paper' }}
  cancel-in-progress: false

jobs:
  # ── Decide what to run ──────────────────────────────────────────────────────
  setup:
    name: Setup & Validate
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      trading_mode: ${{ steps.params.outputs.trading_mode }}
      run_type: ${{ steps.params.outputs.run_type }}
      interval_sequence: ${{ steps.params.outputs.interval_sequence }}
      min_trades_per_day: ${{ steps.params.outputs.min_trades_per_day }}
      should_trade: ${{ steps.params.outputs.should_trade }}
    steps:
      - name: Resolve parameters
        id: params
        run: |
          MODE="${{ inputs.trading_mode || github.event.client_payload.mode || 'paper' }}"
          RUN_TYPE="${{ inputs.run_type || github.event.client_payload.run_type || 'signal' }}"
          INTERVAL_SEQUENCE="${{ inputs.interval_sequence || github.event.client_payload.interval_sequence || '1m,5m,15m' }}"
          MIN_TRADES_PER_DAY="${{ inputs.min_trades_per_day || github.event.client_payload.min_trades_per_day || '2000' }}"
          echo "trading_mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "run_type=${RUN_TYPE}" >> "$GITHUB_OUTPUT"
          echo "interval_sequence=${INTERVAL_SEQUENCE}" >> "$GITHUB_OUTPUT"
          echo "min_trades_per_day=${MIN_TRADES_PER_DAY}" >> "$GITHUB_OUTPUT"
          echo "should_trade=true" >> "$GITHUB_OUTPUT"
          echo "### ⚙️ Run Parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trading Mode | \`${MODE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run Type | \`${RUN_TYPE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Interval Sequence | \`${INTERVAL_SEQUENCE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Min Trades/Day | \`${MIN_TRADES_PER_DAY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # ── Execute trading logic ──────────────────────────────────────────────────
  execute:
    name: Execute – ${{ needs.setup.outputs.run_type }} (${{ needs.setup.outputs.trading_mode }})
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_trade == 'true'
    permissions:
      contents: write    # for saving state to repo (optional)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Restore persisted state (broker state, models, trade history)
      - name: Restore trading state
        uses: actions/cache@v4
        with:
          path: |
            .trading_state/
            models/
          key: trading-state-${{ needs.setup.outputs.trading_mode }}-${{ github.ref_name }}
          restore-keys: |
            trading-state-${{ needs.setup.outputs.trading_mode }}-

      - name: Create results directory
        run: mkdir -p results .trading_state

      - name: Run trading system
        id: trading
        env:
          TRADING_MODE: ${{ needs.setup.outputs.trading_mode }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HYPERLIQUID_SECRET: ${{ secrets.HYPERLIQUID_SECRET || secrets.HYPERLIQUID_PRIVATE_KEY }}
          HYPERLIQUID_PRIVATE_KEY: ${{ secrets.HYPERLIQUID_PRIVATE_KEY || secrets.HYPERLIQUID_SECRET }}
          HYPERLIQUID_ADDRESS: ${{ secrets.HYPERLIQUID_ADDRESS || secrets.HYPERLIQUID_WALLET_ADDRESS }}
          HYPERLIQUID_WALLET_ADDRESS: ${{ secrets.HYPERLIQUID_WALLET_ADDRESS || secrets.HYPERLIQUID_ADDRESS }}
          LIVE_TRADING_ENABLED: ${{ needs.setup.outputs.trading_mode == 'live' && secrets.LIVE_TRADING_ENABLED || 'false' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
        run: |
          if [[ "${{ needs.setup.outputs.run_type }}" != "signal" ]]; then
            python -m src.main \
              --run-type "${{ needs.setup.outputs.run_type }}" \
              --mode "${{ needs.setup.outputs.trading_mode }}"
            exit 0
          fi

          INTERVAL_SEQUENCE="${{ needs.setup.outputs.interval_sequence }}"
          MIN_TRADES_PER_DAY="${{ needs.setup.outputs.min_trades_per_day }}"
          IFS=',' read -ra INTERVALS <<< "${INTERVAL_SEQUENCE}"

          FIRST_INTERVAL=""
          for interval in "${INTERVALS[@]}"; do
            TRIMMED="$(echo "$interval" | xargs)"
            [[ -z "${TRIMMED}" ]] && continue
            if [[ -z "${FIRST_INTERVAL}" ]]; then
              FIRST_INTERVAL="${TRIMMED}"
            fi

            export PRIMARY_INTERVAL="${TRIMMED}"
            export SECONDARY_INTERVAL="5m"
            export MACRO_INTERVAL="15m"
            echo "Running signal cycle for interval ${TRIMMED}"
            python -m src.main --run-type signal --mode "${{ needs.setup.outputs.trading_mode }}"
          done

          if [[ -z "${FIRST_INTERVAL}" ]]; then
            FIRST_INTERVAL="1m"
          fi

          INTERVAL_MINUTES="${FIRST_INTERVAL%m}"
          if [[ "${FIRST_INTERVAL}" == *h ]]; then
            INTERVAL_HOURS="${FIRST_INTERVAL%h}"
            INTERVAL_MINUTES="$((INTERVAL_HOURS * 60))"
          fi
          if [[ -z "${INTERVAL_MINUTES}" || "${INTERVAL_MINUTES}" -le 0 ]]; then
            INTERVAL_MINUTES=1
          fi

          MARKETS_COUNT=$(python - <<'PY'
from src.config import load_config
cfg = load_config()
print(sum(1 for m in cfg.trading.markets if m.enabled))
PY
)
          EXPECTED_TRADES_PER_DAY=$((MARKETS_COUNT * (1440 / INTERVAL_MINUTES)))
          echo "- **Projected trades/day:** ${EXPECTED_TRADES_PER_DAY}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${EXPECTED_TRADES_PER_DAY}" -lt "${MIN_TRADES_PER_DAY}" ]]; then
            echo "Projected trades/day ${EXPECTED_TRADES_PER_DAY} is below required minimum ${MIN_TRADES_PER_DAY}"
            exit 1
          fi

      # Persist updated state
      - name: Save trading state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            .trading_state/
            models/
          key: trading-state-${{ needs.setup.outputs.trading_mode }}-${{ github.ref_name }}

      # Upload results as artifacts for auditing
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-results-${{ needs.setup.outputs.run_type }}-${{ github.run_number }}
          path: results/
          retention-days: 30

  # ── Notify on failure ──────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    permissions: {}
    needs: [setup, execute]
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "## ❌ Trading System Failure" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Job:** ${{ github.job }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Mode:** ${{ needs.setup.outputs.trading_mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time:** $(date -u)" >> "$GITHUB_STEP_SUMMARY"
